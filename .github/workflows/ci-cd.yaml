name: InfraRisk AI CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgdal-dev # Required for geospatial libraries

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install test dependencies not in main requirements
        pip install pytest httpx
        # Install core requirements
        pip install -r requirements.txt

    - name: Run PyTest Suite
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest tests/ -v

  build-docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker Image
      run: |
        docker build -t infrarisk-ai-platform:latest .
        
    - name: Push to Registry (Optional)
      run: |
        echo "Configure docker login and push here for production deployment"
        # docker tag infrarisk-ai-platform:latest my-registry/infrarisk-ai:latest
        # docker push my-registry/infrarisk-ai:latest
